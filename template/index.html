<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevStudy | Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;500&family=Inter:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-main: #0d1117;
            --bg-card: #161b22;
            --bg-sidebar: #010409;
            --accent: #58a6ff;
            --text-dim: #8b949e;
            --text-bright: #c9d1d9;
            --syntax-keyword: #ff7b72;
            --syntax-func: #d2a8ff;
            --syntax-string: #a5d6ff;
            --syntax-const: #79c0ff;
            --syntax-comment: #8b949e;
            --border: #30363d;
            --radius: 12px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg-main); color: var(--text-bright); font-family: 'Inter', sans-serif; display: flex; height: 100vh; overflow: hidden; }
        code, .code-font, .nav-item, .btn-check, .btn-action, .flashcard-front { font-family: 'Fira Code', monospace; }

        /* --- SIDEBAR --- */
        .sidebar { width: 280px; background-color: var(--bg-sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 20px; overflow-y: auto; }
        .logo { font-weight: 700; font-size: 1.2rem; color: var(--syntax-func); margin-bottom: 30px; display: flex; align-items: center; gap: 10px; }
        .nav-group-title { color: var(--syntax-comment); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1.5px; margin: 20px 0 10px 10px; }

        .nav-item { padding: 8px 15px; border-radius: 6px; cursor: pointer; font-size: 0.85rem; color: var(--text-dim); transition: 0.2s; margin-bottom: 2px; display: flex; align-items: center; gap: 8px; }
        .nav-item:hover { background: var(--bg-card); color: var(--syntax-const); }
        .nav-item.active { background: rgba(88, 166, 255, 0.1); color: var(--accent); }
        .nav-sub-item { margin-left: 20px; font-size: 0.8rem; border-left: 1px solid var(--border); border-radius: 0; }

        /* --- CONTEÚDO --- */
        .main { flex: 1; overflow-y: auto; padding: 40px; }
        .container { max-width: 900px; margin: 0 auto; }
        h1 { font-size: 2.2rem; color: var(--syntax-keyword); margin-bottom: 1.5rem; }
        .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 30px; margin-top: 20px; }

        /* --- QUIZ UI --- */
        .quiz-header { display: flex; justify-content: space-between; margin-bottom: 20px; color: var(--syntax-comment); font-size: 0.8rem; font-family: 'Fira Code'; }
        .quiz-option { background: var(--bg-main); border: 1px solid var(--border); padding: 15px; border-radius: var(--radius); margin-bottom: 12px; cursor: pointer; }
        .quiz-option.selected { border-color: var(--accent); background: rgba(88, 166, 255, 0.05); }
        .btn-check { background: var(--syntax-func); color: var(--bg-sidebar); border: none; padding: 12px 24px; border-radius: 8px; font-weight: bold; cursor: pointer; font-family: 'Fira Code'; }
        .btn-nav { background: var(--bg-main); color: var(--text-bright); border: 1px solid var(--border); padding: 12px 24px; border-radius: 8px; cursor: pointer; font-family: 'Fira Code'; }
        .feedback-box { margin-top: 25px; padding: 20px; border-radius: var(--radius); display: none; border-left: 5px solid transparent; }

        /* --- FLASHCARDS --- */
        .flashcard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .flashcard { perspective: 1000px; height: 200px; cursor: pointer; }
        .flashcard-inner { position: relative; width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; }
        .flashcard.flipped .flashcard-inner { transform: rotateY(180deg); }
        .flashcard-front, .flashcard-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; align-items: center; justify-content: center; padding: 25px; border-radius: var(--radius); border: 1px solid var(--border); text-align: center; }
        .flashcard-front { background: var(--bg-card); color: var(--syntax-string); border-bottom: 3px solid var(--accent); }
        .flashcard-back { background: var(--accent); color: var(--bg-sidebar); transform: rotateY(180deg); font-weight: bold; }

        .btn-action { background: transparent; color: var(--accent); border: 1px solid var(--accent); padding: 10px 20px; border-radius: 6px; cursor: pointer; text-transform: uppercase; font-size: 0.8rem; font-family: 'Fira Code'; }

        p {
            font-family: 'Fira Code', monospace;
            font-size: 0.85rem;
            color: var(--text-dim);
            line-height: 1.6;
            margin-bottom: 1rem;
        }

        /* Destaque quando dentro de card */
        .card p {
            color: var(--text-bright);
        }

        /* Estilo opcional: comentário de código */
        p.comment {
            color: var(--syntax-comment);
        }

        /* Estilo opcional: linha ativa tipo terminal */
        p.highlight {
            color: var(--syntax-string);
}
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="logo"><span>&lt;/&gt;</span> DevStudy</div>
        <div id="dynamic-menu"></div>
    </aside>

    <main class="main">
        <div class="container" id="content-area"></div>
    </main>

    <script>
        const DATA = [
            {
                category: "Matérias",
                items: [
                    { title: "Dashboard", id: "home", content: "<h1>Root System</h1><p>Bem-vindo ao seu ambiente de estudos distribuído.</p>" },
                    {
                        title: "Exemplos UI",
                        id: "ui-examples",
                        content: `
                            <h1>Componentes</h1>
                            <p>Aqui estão os exemplos de elementos visuais integrados ao estilo do tema:</p>

                            <div class="card">
                                <h3 style="color:var(--syntax-func); margin-bottom:15px"># Exemplo de Botão</h3>
                                <button class="btn-action" onclick="alert('Action Executed!')">
                                    <span>execute_command.sh</span>
                                </button>
                                <p style="margin-top:15px; font-size:0.85rem; color:var(--text-dim)">// O botão utiliza a fonte Fira Code e o esquema de cores do terminal.</p>
                            </div>

                            <div class="card">
                                <h3 style="color:var(--syntax-func); margin-bottom:15px"># Exemplo de Imagem</h3>
                                <div class="img-container">
                                    <div class="img-header">
                                        <div class="dot" style="background:#ff5f56"></div>
                                        <div class="dot" style="background:#ffbd2e"></div>
                                        <div class="dot" style="background:#27c93f"></div>
                                        <span style="margin-left:10px; font-size:10px; color:var(--text-dim); font-family:'Fira Code'">preview_image.png</span>
                                    </div>
                                    <div class="img-content">
                                        <img src="https://images.unsplash.com/photo-1555066931-4365d14bab8c?auto=format&fit=crop&w=800&q=80" alt="Exemplo de Código">
                                    </div>
                                </div>
                            </div>
                        `
                    }
                ]
            },
            {
                category: "Quizzes",
                id: "group-quiz",
                subitems: [
                    {
                        title: "Lógica JS",
                        id: "q-logic",
                        questions: [
                            { q: "Qual o resultado de !!'false'?", options: ["true", "false", "undefined"], correct: 0, explanation: "Qualquer string não vazia é truthy, a dupla negação resulta em true." },
                            { q: "Qual operador verifica valor e tipo?", options: ["==", "=", "==="], correct: 2, explanation: "O operador === (estritamente igual) não realiza coerção de tipos." }
                        ]
                    },
                    {
                        title: "CSS Selectors",
                        id: "q-css",
                        questions: [
                            { q: "Como selecionar um ID em CSS?", options: [".nome", "#nome", "*nome"], correct: 1, explanation: "O caractere '#' é o seletor de ID." }
                        ]
                    }
                ]
            },
            {
                category: "Flashcards",
                id: "group-flash",
                subitems: [
                    {
                        title: "Machine Learning",
                        id: "f-ml",
                        cards: [
                            { q: "O que é Gradiente Descendente?", a: "Um algoritmo de otimização para encontrar o mínimo de uma função." },
                            { q: "Diferença entre Regressão e Classificação?", a: "Regressão prevê números contínuos; Classificação prevê categorias." }
                        ]
                    },
                    {
                        title: "Deep Learning",
                        id: "f-dl",
                        cards: [
                            { q: "O que é um Neurônio Artificial?", a: "Uma função matemática que recebe entradas e gera uma ativação." },
                            { q: "O que faz a função ReLU?", a: "Transforma valores negativos em zero para introduzir não-linearidade." }
                        ]
                    }
                ]
            }
        ];

        let currentItem = null;
        let quizIndex = 0;
        let score = 0;
        let selectedIdx = null;
        let answered = false;

        function renderMenu() {
            const menu = document.getElementById('dynamic-menu');
            menu.innerHTML = DATA.map(group => {
                let html = `<div class="nav-group-title">${group.category}</div>`;

                // Itens principais (Matérias)
                if (group.items) {
                    group.items.forEach(item => {
                        html += `<div class="nav-item" data-id="${item.id}" onclick="show('${item.id}')">> ${item.title}</div>`;
                    });
                }

                // Subitens (Quizzes e Flashcards)
                if (group.subitems) {
                    group.subitems.forEach(sub => {
                        html += `<div class="nav-item nav-sub-item" data-id="${sub.id}" onclick="show('${sub.id}')">> ${sub.title}</div>`;
                    });
                }
                return html;
            }).join('');
        }

        function show(id) {
            const area = document.getElementById('content-area');
            let found = null;

            DATA.forEach(g => {
                const item = (g.items || []).find(i => i.id === id) || (g.subitems || []).find(s => s.id === id);
                if(item) found = item;
            });

            currentItem = found;
            document.querySelectorAll('.nav-item').forEach(el => el.classList.toggle('active', el.getAttribute('data-id') === id));

            if (found.questions) {
                quizIndex = 0; score = 0; renderQuizStep();
            } else if (found.cards) {
                renderFlashcards(found);
            } else {
                area.innerHTML = found.content;
            }
        }

        // --- QUIZ ---
        function renderQuizStep() {
            const area = document.getElementById('content-area');
            const q = currentItem.questions[quizIndex];
            selectedIdx = null; answered = false;
            area.innerHTML = `
                <div class="quiz-header"><span>Questão ${quizIndex + 1}/${currentItem.questions.length}</span></div>
                <h1>${currentItem.title}</h1>
                <div class="card">
                    <p style="color:var(--syntax-const); font-family:'Fira Code'; margin-bottom:20px">// ${q.q}</p>
                    <div id="quiz-options">${q.options.map((o, i) => `<div class="quiz-option" onclick="selectOpt(this, ${i})">0${i+1}. ${o}</div>`).join('')}</div>
                    <div id="feedback" class="feedback-box"></div>
                    <div class="quiz-footer" style="display:flex; gap:10px; margin-top:20px;">
                        <button class="btn-check" id="check-btn" onclick="handleCheck()">Run_Test()</button>
                        <button class="btn-nav" id="next-btn" onclick="handleNext()" style="display:none">
                            ${quizIndex === currentItem.questions.length - 1 ? 'Show_Results()' : 'Next_Step()'}
                        </button>
                    </div>
                </div>
            `;
        }

        function selectOpt(el, idx) { if(answered) return; document.querySelectorAll('.quiz-option').forEach(opt => opt.classList.remove('selected')); el.classList.add('selected'); selectedIdx = idx; }

        function handleCheck() {
            if (selectedIdx === null || answered) return;
            answered = true; const q = currentItem.questions[quizIndex];
            const f = document.getElementById('feedback'); f.style.display = 'block';
            if(selectedIdx === q.correct) { score++; f.style.background = "#23863622"; f.style.color = "#3fb950"; f.style.borderColor = "#238636"; f.innerHTML = "<strong>[PASS]</strong>"; }
            else { f.style.background = "#da363322"; f.style.color = "#f85149"; f.style.borderColor = "#da3633"; f.innerHTML = `<strong>[FAIL]:</strong> ${q.explanation}`; }
            document.getElementById('check-btn').style.display = 'none'; document.getElementById('next-btn').style.display = 'block';
        }

        function handleNext() { (quizIndex < currentItem.questions.length - 1) ? (quizIndex++, renderQuizStep()) : renderResult(); }

        function renderResult() {
            document.getElementById('content-area').innerHTML = `<h1>Resultados</h1><div class="card" style="text-align:center"><h2 style="color:var(--syntax-func); font-size:3rem">${Math.round((score/currentItem.questions.length)*100)}%</h2><p>Acertos: ${score}/${currentItem.questions.length}</p><button class="btn-action" onclick="show('${currentItem.id}')" style="margin-top:20px">Retry</button></div>`;
        }

        // --- FLASHCARDS ---
        function renderFlashcards(item) {
            document.getElementById('content-area').innerHTML = `
                <h1>${item.title}</h1>
                <div class="flashcard-grid">
                    ${item.cards.map(c => `
                        <div class="flashcard" onclick="this.classList.toggle('flipped')">
                            <div class="flashcard-inner">
                                <div class="flashcard-front"><span style="color:var(--syntax-comment); position:absolute; top:15px; left:20px; font-size:10px">// Card</span>${c.q}</div>
                                <div class="flashcard-back">${c.a}</div>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        renderMenu();
        show('home');
    </script>
</body>
</html>
