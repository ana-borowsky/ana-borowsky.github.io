<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevStudy | Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;500&family=Inter:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            /* --- BASE --- */
            --bg-main: #0d1117;
            --bg-card: #161b22;
            --bg-sidebar: #010409;

            /* --- TEXTO --- */
            --text-bright: #c9d1d9;
            --text-dim: #8b949e;
            --text-muted: #6e7681;

            /* --- BORDAS / DIVISORES --- */
            --border: #30363d;
            --border-soft: #21262d;
            --border-strong: #484f58;

            /* --- ACCENTS --- */
            --accent: #58a6ff;
            --accent-hover: #79c0ff;
            --accent-soft: rgba(88, 166, 255, 0.15);

            /* --- SINTAXE (CODE THEME) --- */
            --syntax-keyword: #ff7b72;
            --syntax-func: #d2a8ff;
            --syntax-string: #a5d6ff;
            --syntax-const: #79c0ff;
            --syntax-comment: #8b949e;
            --syntax-number: #ffa657;
            --syntax-type: #7ee787;
            --syntax-operator: #ff7b72;

            /* --- STATUS (UI/UX) --- */
            --success: #3fb950;
            --success-bg: rgba(63, 185, 80, 0.15);

            --error: #f85149;
            --error-bg: rgba(248, 81, 73, 0.15);

            --warning: #d29922;
            --warning-bg: rgba(210, 153, 34, 0.15);

            --info: #58a6ff;
            --info-bg: rgba(88, 166, 255, 0.15);

            /* --- TERMINAL / LOG --- */
            --terminal-green: #3fb950;
            --terminal-red: #f85149;
            --terminal-yellow: #e3b341;
            --terminal-blue: #58a6ff;

            /* --- HOVER / INTERAÇÃO --- */
            --hover-bg: rgba(255, 255, 255, 0.03);
            --active-bg: rgba(88, 166, 255, 0.1);

            /* --- SOMBRA (profundidade leve) --- */
            --shadow-soft: 0 0 0 1px rgba(255,255,255,0.02), 0 8px 24px rgba(0,0,0,0.3);

            --radius: 12px;
        }
        /* --- RESET --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-main);
            color: var(--text-bright);
            font-family: 'Inter', sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        code, .code-font, .nav-item, .btn-check, .btn-action, .flashcard-front {
            font-family: 'Fira Code', monospace;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 280px;
            background-color: var(--bg-sidebar);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 20px;
            overflow-y: auto;
        }

        .logo {
            font-weight: 700;
            font-size: 1.2rem;
            color: var(--syntax-func);
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-group-title {
            color: var(--syntax-comment);
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin: 20px 0 10px 10px;
        }

        .nav-item {
            padding: 8px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            color: var(--text-dim);
            transition: 0.2s;
            margin-bottom: 2px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-item:hover {
            background: var(--hover-bg);
            color: var(--syntax-const);
        }

        .nav-item.active {
            background: var(--active-bg);
            color: var(--accent);
        }

        .nav-sub-item {
            margin-left: 20px;
            font-size: 0.8rem;
            border-left: 1px solid var(--border-soft);
        }

        /* --- CONTEÚDO --- */
        .main {
            flex: 1;
            overflow-y: auto;
            padding: 40px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        h1 {
            font-size: 2.2rem;
            color: var(--syntax-keyword);
            margin-bottom: 1.5rem;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 30px;
            margin-top: 20px;
            box-shadow: var(--shadow-soft);
        }

        /* --- QUIZ UI --- */
        .quiz-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            color: var(--syntax-comment);
            font-size: 0.8rem;
            font-family: 'Fira Code';
        }

        .quiz-option {
            background: var(--bg-main);
            border: 1px solid var(--border);
            padding: 15px;
            border-radius: var(--radius);
            margin-bottom: 12px;
            cursor: pointer;
            transition: 0.2s;
        }

        .quiz-option:hover {
            background: var(--hover-bg);
        }

        .quiz-option.selected {
            border-color: var(--accent);
            background: var(--accent-soft);
        }

        /* BOTÕES */
        .btn-check {
            background: var(--syntax-func);
            color: var(--bg-sidebar);
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        .btn-check:hover {
            filter: brightness(1.1);
        }

        .btn-nav {
            background: var(--bg-main);
            color: var(--text-bright);
            border: 1px solid var(--border);
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
        }

        .btn-nav:hover {
            background: var(--hover-bg);
        }

        /* FEEDBACK */
        .feedback-box {
            margin-top: 25px;
            padding: 20px;
            border-radius: var(--radius);
            display: none;
            border-left: 5px solid var(--border-strong);
            background: var(--bg-card);
        }

        /* --- FLASHCARDS --- */
        .flashcard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }

        .flashcard {
            perspective: 1000px;
            height: 200px;
            cursor: pointer;
        }

        .flashcard-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s;
            transform-style: preserve-3d;
        }

        .flashcard.flipped .flashcard-inner {
            transform: rotateY(180deg);
        }

        .flashcard-front,
        .flashcard-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 25px;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            text-align: center;
        }

        .flashcard-front {
            background: var(--bg-card);
            color: var(--syntax-string);
            border-bottom: 3px solid var(--accent);
        }

        .flashcard-back {
            background: var(--accent);
            color: var(--bg-sidebar);
            transform: rotateY(180deg);
            font-weight: bold;
        }

        /* BOTÃO ACTION */
        .btn-action {
            background: transparent;
            color: var(--accent);
            border: 1px solid var(--accent);
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 0.8rem;
        }

        .btn-action:hover {
            background: var(--accent-soft);
            color: var(--accent-hover);
        }

        /* --- TEXTO --- */
        p {
            font-family: 'Fira Code', monospace;
            font-size: 0.85rem;
            color: var(--text-dim);
            line-height: 1.6;
            margin-bottom: 1rem;
        }

        .card p {
            color: var(--text-bright);
        }

        p.comment {
            color: var(--syntax-comment);
        }

        p.highlight {
            color: var(--syntax-string);
        }

        /* --- LISTAS --- */
        ul {
            list-style: none;
            padding-left: 0;
            margin: 1rem 0;
        }

        ul li {
            font-family: 'Fira Code', monospace;
            font-size: 0.85rem;
            color: var(--text-dim);
            padding: 6px 0 6px 18px;
            position: relative;
            transition: 0.2s;
        }

        ul li::before {
            content: ">";
            position: absolute;
            left: 0;
            color: var(--syntax-const);
        }

        ul li:hover {
            color: var(--text-bright);
            background: var(--hover-bg);
        }

        ul li.active {
            color: var(--accent);
        }

        ul.code-list li::before {
            content: attr(data-index) ".";
            color: var(--syntax-func);
        }

        ul.comment-list li {
            color: var(--syntax-comment);
        }

        /* CONTAINER */
        .exp-item {
            margin: 12px 0;
        }

        /* HEADER (clicável) */
        .exp-header {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            padding: 6px 0 6px 18px;
            font-family: 'Fira Code', monospace;
            font-size: 0.85rem;
            color: var(--text-dim);
            position: relative;
            transition: 0.2s;
        }

        .exp-header:hover {
            color: var(--text-bright);
            background: var(--hover-bg);
        }

        /* PREFIXO estilo terminal */
        .exp-icon {
            position: absolute;
            left: 0;
            color: var(--syntax-const);
            transition: transform 0.2s;
        }

        /* TÍTULO */
        .exp-title {
            color: var(--text-dim);
        }

        /* CONTEÚDO */
        .exp-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
            padding-left: 18px;
        }

        /* ESTADO ABERTO */
        .exp-item.open .exp-content {
            max-height: 500px; /* suficiente pra conteúdo */
            margin-top: 8px;
        }

        .exp-item.open .exp-icon {
            transform: rotate(90deg);
            color: var(--accent);
        }

        .exp-item.open .exp-title {
            color: var(--accent);
        }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="logo"><span>&lt;/&gt;</span>Machine Learning</div>
        <div id="dynamic-menu"></div>
    </aside>

    <main class="main">
        <div class="container" id="content-area"></div>
    </main>

    <script>
        const DATA = [
            {
                category: "RA1",
                items: [
                    { title: "Home", id: "home", content: "<h1>Home</h1><p>Bem-vindo ao seu ambiente de estudos de machine learning. Conteúdo baseado nas aulas de Aprendizagem de Máquina, ministradas pelo professor Alceu de Souza Britto Junior, para o curso de Ciência da Computação da PUCPR no primeiro semestre de 2026.</p>" },
                    {
                        title: "Introdução",
                        id: "introducao",
                        content: `
                            <h1>Introdução</h1>
                            <p>Uma breve introdução ao tema que iremos estudar ao longo desta aplicação.</p>

                            <div class="card">
                                <h3 style="color:var(--syntax-func); margin-bottom:15px"># PDF das aulas introdutórias</h3>
                                <button class="btn-action" onclick="window.location.href='https://pucpr.instructure.com/courses/63781/pages/introducao-conceitos-e-definicoes-basicas?module_item_id=1515421'">
                                    <span>aula_indroducao.pdf</span>
                                </button>
                            </div>
                            
                            <br>
                            <div>
                                <h3 style="color:var(--syntax-func); margin-bottom:15px"># Do que se trata a aprendizagem de máquina(AM)?</h3>
                                <ul>
                                  <li>Ramo da Inteligência Artificial</li>
                                  <li>Solução de um problema aprendida a partir de dados (amostras ou exemplos).</li>
                                  <li>Mínimo de intervenção humana.</li>
                                  <li>Uso de técnicas de indução</li>
                                  <li>Modelos cognitivos - Dados (commodity do século XXI) transformados em conhecimento.</li>
                                </ul>
                            </div>

                            <div class="card">
                                <h3 style="color:var(--syntax-func); margin-bottom:15px"># Quando deve ser utilizada?</h3>
                                <ul>
                                  <li>O problema está bem claro? Representação adequada é crucial para o sucesso de um projeto.</li>
                                  <li>O problema não tem uma solução convencional (determinística)? Treinar e avaliar modelos cognitivos NÃO é uma tarefa trivial.</li>
                                  <li>Há dados suficientes em quantidade e qualidade? Representatividade das amostras de treinamento é primordial.</li>
                                  <li>Há profissionais de AM disponíveis? Experiência no preparo dos dados, seleção da técnica adequada e definição de protocolo experimental robusto.</li>
                                  <li>Há hardware adequado para uso das técnicas de aprendizado de máquina? Algumas técnicas demandam processamento paralelo.</li>
                                </ul>
                            </div>
                            <br>
                            <div>
                              <h3 style="color:var(--syntax-func); margin-bottom:15px"># Quais as abordagens?</h3>
                              <div class="exp-item">
                                <div class="exp-header" onclick="this.parentElement.classList.toggle('open')">
                                    <span class="exp-icon">></span>
                                    <span class="exp-title">Não supervisionada</span>
                                </div>

                                <div class="exp-content">
                                    <p class="highlight">Não requer dados rotulados.</p>
                                </div>
                              </div>

                              <div class="exp-item">
                                <div class="exp-header" onclick="this.parentElement.classList.toggle('open')">
                                    <span class="exp-icon">></span>
                                    <span class="exp-title">Supervisionada</span>
                                </div>

                                <div class="exp-content">
                                    <p class="highlight">Requer dados rotulados.</p>
                                </div>
                              </div>

                              <div class="exp-item">
                                <div class="exp-header" onclick="this.parentElement.classList.toggle('open')">
                                    <span class="exp-icon">></span>
                                    <span class="exp-title">Semi-supervisionada</span>
                                </div>

                                <div class="exp-content">
                                    <p class="highlight">Alternativa quando não temos dados rotulados em quantidade suficiente.</p>
                                </div>
                              </div>

                              <div class="exp-item">
                                <div class="exp-header" onclick="this.parentElement.classList.toggle('open')">
                                    <span class="exp-icon">></span>
                                    <span class="exp-title">Por reforço</span>
                                </div>

                                <div class="exp-content">
                                    <p class="highlight">Não precisa de dados de treinamento.</p>
                                </div>
                              </div>
                          </div>
                        `
                    }
                ]
            },
            {
                category: "Quizzes",
                id: "group-quiz",
                subitems: [
                    {
                        title: "Lógica JS",
                        id: "q-logic",
                        questions: [
                            { q: "Qual o resultado de !!'false'?", options: ["true", "false", "undefined"], correct: 0, explanation: "Qualquer string não vazia é truthy, a dupla negação resulta em true." },
                            { q: "Qual operador verifica valor e tipo?", options: ["==", "=", "==="], correct: 2, explanation: "O operador === (estritamente igual) não realiza coerção de tipos." }
                        ]
                    },
                    {
                        title: "CSS Selectors",
                        id: "q-css",
                        questions: [
                            { q: "Como selecionar um ID em CSS?", options: [".nome", "#nome", "*nome"], correct: 1, explanation: "O caractere '#' é o seletor de ID." }
                        ]
                    }
                ]
            },
            {
                category: "Flashcards",
                id: "group-flash",
                subitems: [
                    {
                        title: "Machine Learning",
                        id: "f-ml",
                        cards: [
                            { q: "O que é Gradiente Descendente?", a: "Um algoritmo de otimização para encontrar o mínimo de uma função." },
                            { q: "Diferença entre Regressão e Classificação?", a: "Regressão prevê números contínuos; Classificação prevê categorias." }
                        ]
                    },
                    {
                        title: "Deep Learning",
                        id: "f-dl",
                        cards: [
                            { q: "O que é um Neurônio Artificial?", a: "Uma função matemática que recebe entradas e gera uma ativação." },
                            { q: "O que faz a função ReLU?", a: "Transforma valores negativos em zero para introduzir não-linearidade." }
                        ]
                    }
                ]
            }
        ];

        let currentItem = null;
        let quizIndex = 0;
        let score = 0;
        let selectedIdx = null;
        let answered = false;

        function renderMenu() {
            const menu = document.getElementById('dynamic-menu');
            menu.innerHTML = DATA.map(group => {
                let html = `<div class="nav-group-title">${group.category}</div>`;

                // Itens principais (Matérias)
                if (group.items) {
                    group.items.forEach(item => {
                        html += `<div class="nav-item" data-id="${item.id}" onclick="show('${item.id}')">> ${item.title}</div>`;
                    });
                }

                // Subitens (Quizzes e Flashcards)
                if (group.subitems) {
                    group.subitems.forEach(sub => {
                        html += `<div class="nav-item nav-sub-item" data-id="${sub.id}" onclick="show('${sub.id}')">> ${sub.title}</div>`;
                    });
                }
                return html;
            }).join('');
        }

        function show(id) {
            const area = document.getElementById('content-area');
            let found = null;

            DATA.forEach(g => {
                const item = (g.items || []).find(i => i.id === id) || (g.subitems || []).find(s => s.id === id);
                if(item) found = item;
            });

            currentItem = found;
            document.querySelectorAll('.nav-item').forEach(el => el.classList.toggle('active', el.getAttribute('data-id') === id));

            if (found.questions) {
                quizIndex = 0; score = 0; renderQuizStep();
            } else if (found.cards) {
                renderFlashcards(found);
            } else {
                area.innerHTML = found.content;
            }
        }

        // --- QUIZ ---
        function renderQuizStep() {
            const area = document.getElementById('content-area');
            const q = currentItem.questions[quizIndex];
            selectedIdx = null; answered = false;
            area.innerHTML = `
                <div class="quiz-header"><span>Questão ${quizIndex + 1}/${currentItem.questions.length}</span></div>
                <h1>${currentItem.title}</h1>
                <div class="card">
                    <p style="color:var(--syntax-const); font-family:'Fira Code'; margin-bottom:20px">// ${q.q}</p>
                    <div id="quiz-options">${q.options.map((o, i) => `<div class="quiz-option" onclick="selectOpt(this, ${i})">0${i+1}. ${o}</div>`).join('')}</div>
                    <div id="feedback" class="feedback-box"></div>
                    <div class="quiz-footer" style="display:flex; gap:10px; margin-top:20px;">
                        <button class="btn-check" id="check-btn" onclick="handleCheck()">Run_Test()</button>
                        <button class="btn-nav" id="next-btn" onclick="handleNext()" style="display:none">
                            ${quizIndex === currentItem.questions.length - 1 ? 'Show_Results()' : 'Next_Step()'}
                        </button>
                    </div>
                </div>
            `;
        }

        function selectOpt(el, idx) { if(answered) return; document.querySelectorAll('.quiz-option').forEach(opt => opt.classList.remove('selected')); el.classList.add('selected'); selectedIdx = idx; }

        function handleCheck() {
            if (selectedIdx === null || answered) return;
            answered = true; const q = currentItem.questions[quizIndex];
            const f = document.getElementById('feedback'); f.style.display = 'block';
            if(selectedIdx === q.correct) { score++; f.style.background = "#23863622"; f.style.color = "#3fb950"; f.style.borderColor = "#238636"; f.innerHTML = "<strong>[PASS]</strong>"; }
            else { f.style.background = "#da363322"; f.style.color = "#f85149"; f.style.borderColor = "#da3633"; f.innerHTML = `<strong>[FAIL]:</strong> ${q.explanation}`; }
            document.getElementById('check-btn').style.display = 'none'; document.getElementById('next-btn').style.display = 'block';
        }

        function handleNext() { (quizIndex < currentItem.questions.length - 1) ? (quizIndex++, renderQuizStep()) : renderResult(); }

        function renderResult() {
            document.getElementById('content-area').innerHTML = `<h1>Resultados</h1><div class="card" style="text-align:center"><h2 style="color:var(--syntax-func); font-size:3rem">${Math.round((score/currentItem.questions.length)*100)}%</h2><p>Acertos: ${score}/${currentItem.questions.length}</p><button class="btn-action" onclick="show('${currentItem.id}')" style="margin-top:20px">Retry</button></div>`;
        }

        // --- FLASHCARDS ---
        function renderFlashcards(item) {
            document.getElementById('content-area').innerHTML = `
                <h1>${item.title}</h1>
                <div class="flashcard-grid">
                    ${item.cards.map(c => `
                        <div class="flashcard" onclick="this.classList.toggle('flipped')">
                            <div class="flashcard-inner">
                                <div class="flashcard-front"><span style="color:var(--syntax-comment); position:absolute; top:15px; left:20px; font-size:10px">// Card</span>${c.q}</div>
                                <div class="flashcard-back">${c.a}</div>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        renderMenu();
        show('home');
    </script>
</body>
</html>
